<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudySphere | Inte ractive Dashboard</title>
    <link rel="icon" type="image/png" href="favicon.ico">
    <!-- CSS Libraries -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Three.js Background Canvas -->
    <canvas id="sphere-canvas"></canvas>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg fixed-top blur-nav">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#"><i class="bi bi-cpu-fill me-2"></i>StudySphere</a>
            <div class="d-flex align-items-center">
                <button id="theme-toggle" class="btn btn-link nav-link me-3">
                    <i class="bi bi-moon-stars-fill" id="theme-icon"></i>
                </button>
                <ul class="navbar-nav d-none d-md-flex flex-row gap-4">
                    <li class="nav-item"><a href="#dashboard" class="nav-link">Dashboard</a></li>
                    <li class="nav-item"><a href="#timer" class="nav-link">Timer</a></li>
                    <li class="nav-item"><a href="#log" class="nav-link">Logs</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5">

        <!-- Dashboard Section -->
        <section id="dashboard" class="vh-100 d-flex align-items-center pt-5">
            <div class="row w-100 mt-5">
                <div class="col-lg-6 mb-4">
                    <h1 class="display-3 fw-bold mb-3">Master Your <span class="text-gradient">Focus.</span></h1>
                    <p class="lead opacity-75">Track habits, visualize progress, and conquer your goals with
                        StudySphere's 3D interactive dashboard.</p>
                    <div class="d-flex gap-3 mt-4">
                        <div class="stat-card">
                            <h3 id="total-hours">0</h3>
                            <span>Total Hours</span>
                        </div>
                        <div class="stat-card">
                            <h3 id="current-streak">0</h3>
                            <span>Day Streak</span>
                        </div>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="glass-card p-4">
                        <canvas id="progressChart"></canvas>
                    </div>
                </div>
            </div>
        </section>

        <!-- Timer Section -->
        <section id="timer" class="py-5 min-vh-100 d-flex align-items-center">
            <div class="row w-100 justify-content-center">
                <div class="col-md-6 text-center">
                    <div class="timer-display mb-4">
                        <h2 id="timer-label">Focus Session</h2>
                        <div class="display-1 fw-black" id="time-left">25:00</div>
                    </div>
                    <div class="controls d-flex justify-content-center gap-3">
                        <button class="btn btn-primary btn-lg px-5 rounded-pill" id="start-btn">Start</button>
                        <button class="btn btn-outline-secondary btn-lg px-5 rounded-pill" id="reset-btn">Reset</button>
                    </div>
                    <div class="mt-4">
                        <button class="btn btn-sm btn-dark mx-1 mode-btn active" data-time="1500">Pomodoro</button>
                        <button class="btn btn-sm btn-dark mx-1 mode-btn" data-time="300">Short Break</button>
                        <button class="btn btn-sm btn-dark mx-1 mode-btn" data-time="900">Long Break</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Study Log Section -->
        <section id="log" class="py-5 min-vh-100">
            <div class="glass-card p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="mb-0">Session History</h2>
                    <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#addLogModal">
                        <i class="bi bi-plus-lg"></i> Add Session
                    </button>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover custom-table">
                        <thead>
                            <tr>
                                <th>Subject</th>
                                <th>Duration</th>
                                <th>Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="log-body">
                            <!-- JS will inject logs here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <!-- Modal -->
    <div class="modal fade" id="addLogModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content glass-card">
                <div class="modal-header border-0">
                    <h5 class="modal-title">Log Study Session</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="log-form">
                        <div class="mb-3">
                            <label class="form-label">Subject</label>
                            <input type="text" id="log-subject" class="form-control" placeholder="e.g. Mathematics"
                                required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Minutes</label>
                            <input type="number" id="log-minutes" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Save Session</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- Use ES Modules for three.js and Lenis -->
    <script type="module" src="js/app.js"></script>
</body>

</html>
